# Integration test override — all services in Docker (no hot reload).
# Usage: docker compose -f docker-compose.yml -f docker-compose.integration.yml --profile reasoning up -d --build
# Or:    make up-integration
services:
  nginx:
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"

  certbot:
    entrypoint: ["echo", "certbot disabled in integration test"]
    restart: "no"

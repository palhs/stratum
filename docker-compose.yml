name: stratum

# =============================================================================
# Networks: INFRA-02 — dual-network isolation
#   - ingestion: n8n + storage services
#   - reasoning: future LangGraph/FastAPI + storage services
#   Storage services join BOTH; consumer services join ONE only.
# =============================================================================
# VPS PREREQUISITE (INFRA-04): 4GB swap must be configured on the host.
# Run on VPS (not inside Docker):
#   sudo fallocate -l 4G /swapfile && sudo chmod 600 /swapfile
#   sudo mkswap /swapfile && sudo swapon /swapfile
#   echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
#   sudo sysctl vm.swappiness=10
#   echo 'vm.swappiness=10' | sudo tee -a /etc/sysctl.conf
# Verify: free -h (should show 4G swap)
# =============================================================================
networks:
  ingestion:
    driver: bridge
  reasoning:
    driver: bridge

# =============================================================================
# Volumes: named volumes only (no bind mounts for persistent data)
# =============================================================================
volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  qdrant_storage:
  n8n_data:

services:

  # ===========================================================================
  # STORAGE TIER — attached to both networks; no host port mapping for postgres/qdrant
  # Profiles: storage | ingestion | reasoning
  # ===========================================================================

  postgres:
    image: postgres:16-alpine
    mem_limit: 512m
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ingestion
      - reasoning
    profiles: ["storage", "ingestion", "reasoning"]
    # NOTE: No ports — postgres is internal only (locked decision)

  neo4j:
    image: neo4j:5.26.21
    mem_limit: 2g
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_PLUGINS: '["apoc"]'
      # JVM tuning: heap(1G) + pagecache(512m) = 1.5GB within 2g mem_limit
      # initial=max prevents GC pause spikes from heap growth (Neo4j recommendation)
      NEO4J_server_memory_heap_initial__size: "1G"
      NEO4J_server_memory_heap_max__size: "1G"
      NEO4J_server_memory_pagecache_size: "512m"
      NEO4J_apoc_trigger_enabled: "true"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"   # Neo4j Browser (admin UI — exposed on host)
      - "7687:7687"   # Bolt protocol (admin UI — exposed on host)
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - ingestion
      - reasoning
    profiles: ["storage", "ingestion", "reasoning"]

  qdrant:
    image: qdrant/qdrant:v1.15.3
    mem_limit: 1g
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY}
    volumes:
      - qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ingestion
      - reasoning
    profiles: ["storage", "ingestion", "reasoning"]
    # NOTE: No ports — qdrant is internal only (locked decision)

  # ===========================================================================
  # MIGRATION / INIT TIER — one-shot services, exit after completion
  # Profiles: storage | ingestion | reasoning
  # ===========================================================================

  flyway:
    image: flyway/flyway:10
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./db/migrations:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: ["flyway", "migrate"]
    networks:
      - ingestion
    profiles: ["storage", "ingestion", "reasoning"]
    # No restart policy — flyway exits after migration completes

  neo4j-init:
    image: neo4j:5.26.21
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./neo4j/init:/init-scripts
    entrypoint: >
      bash -c "
        echo 'Running constraints against neo4j database...';
        cypher-shell -a bolt://neo4j:7687 -u neo4j -p $$NEO4J_PASSWORD -d neo4j -f /init-scripts/01_constraints.cypher;
        echo 'Running APOC triggers against system database...';
        cypher-shell -a bolt://neo4j:7687 -u neo4j -p $$NEO4J_PASSWORD -d system -f /init-scripts/02_apoc_triggers.cypher;
        echo 'Neo4j init complete.'
      "
    environment:
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    networks:
      - ingestion
    profiles: ["storage", "ingestion", "reasoning"]
    # No restart policy — one-shot init; runs against system database for APOC trigger.install()

  qdrant-init:
    image: curlimages/curl:latest
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./scripts/init-qdrant.sh:/init-qdrant.sh:ro
    entrypoint: ["sh", "/init-qdrant.sh"]
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
    networks:
      - ingestion
    profiles: ["storage", "ingestion", "reasoning"]
    # No restart policy — one-shot init

  # ===========================================================================
  # INGESTION TIER — ingestion network ONLY (INFRA-02 enforcement)
  # n8n has no path to the reasoning network
  # ===========================================================================

  n8n:
    image: n8nio/n8n:2.10.2
    mem_limit: 512m
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME}
      DB_POSTGRESDB_USER: ${N8N_DB_USER}
      DB_POSTGRESDB_PASSWORD: ${N8N_DB_PASSWORD}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      GENERIC_TIMEZONE: Asia/Ho_Chi_Minh
      N8N_DIAGNOSTICS_ENABLED: "false"
    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"   # n8n UI (exposed on host)
    networks:
      - ingestion     # n8n ONLY — cannot reach reasoning network (INFRA-02)
    profiles: ["ingestion"]

  # ===========================================================================
  # DATA SIDECAR — Python FastAPI ingestion service
  # Internal only — no host port mapping (n8n calls data-sidecar:8000)
  # Profile: ingestion
  # ===========================================================================

  data-sidecar:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    mem_limit: 512m
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      VNSTOCK_API_KEY: ${VNSTOCK_API_KEY:-}
      FRED_API_KEY: ${FRED_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ingestion     # ingestion network only (INFRA-02 enforcement)
    profiles: ["ingestion"]
    # NOTE: No host port mapping — n8n calls data-sidecar:8000 internally
